name: Publish container image

# Triggers on semver tag push (vX.Y.Z, optionally with -beta./-rc. suffix). The
# tag drives both the version label and the published image tag. We push a
# multi-arch manifest list so a single tag (e.g. `:0.1.0` or `:latest`) resolves
# to the right arch on the puller's host. amd64 builds natively, arm64 under
# QEMU (fine — the slow part is npm/tsc, which is arch-independent).
#
# Tag glob is intentionally tight so stray tags like `vendor-fix` or `vnext`
# don't trigger a publish. Prerelease suffixes still match (leading digits only).

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.1.0). For dispatch runs only."
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/signalk-tailscale-server
    steps:
      - name: Validate tag is semver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.tag }}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '${VERSION}' is not valid semver X.Y.Z[-prerelease][+build]"
            exit 1
          fi

      - uses: actions/checkout@v7

      - name: Resolve version + tags
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.tag }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:${VERSION}"
            if [[ "${VERSION}" != *-beta.* && "${VERSION}" != *-rc.* ]]; then
              echo "${IMAGE}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Publishing version: ${VERSION}"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64 + arm64 manifest)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          provenance: false

  release:
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
