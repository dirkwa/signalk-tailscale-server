name: Build Image

# Multi-arch container image build (no push). Runs on:
# - main pushes — post-merge sanity check that the Dockerfile still builds
#   (and that the pinned Tailscale tarball still downloads + checksums)
# - workflow_dispatch — force a build when you want to test something
#
# PRs do NOT trigger this. The image is mostly source in a thin Node runtime, so
# almost any meaningful PR touches image-relevant files anyway — burning ~5-8
# minutes of QEMU emulation per PR for ~95% overlap with `test` was poor value.
# publish.yml handles the tag-triggered build that actually pushes.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build (amd64 + arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: signalk-tailscale-server:ci
